version: "3.9"

services:
  postgres:
    image: postgres:16-alpine        # alpine = smaller image, same postgres
    environment:
      POSTGRES_USER: deadlock
      POSTGRES_PASSWORD: deadlock
      POSTGRES_DB: deadlock
    ports:
      - "5432:5432"                  # expose to host so you can use TablePlus/psql locally
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data survives docker compose down

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env                         # injects DATABASE_URL, REDIS_URL into the container
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app               # hot reload: local file changes reflect instantly
    command: uvicorn main:app --host 0.0.0.0 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data: